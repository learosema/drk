<header>
  <div class="header-brand">
    <svg class="drk-logo-svg" viewBox="0 0 48 48" fill="none" aria-label="DRK Logo" role="img">
      <rect width="48" height="48" rx="6" fill="white"/>
      <rect x="17" y="5" width="14" height="38" rx="3" fill="#e60005"/>
      <rect x="5" y="17" width="38" height="14" rx="3" fill="#e60005"/>
    </svg>
    <div class="header-titles">
      <span class="header-org" data-i18n="header_org">Deutsches Rotes Kreuz</span>
      <span class="header-title" data-i18n="header_title">Ein System für Menschen in Not – global, national, lokal</span>
    </div>
  </div>

  <nav class="breadcrumb" aria-label="Navigationsebene">
    <div class="bc-item" id="bc-global"><button onclick="setLevel('global')" aria-label="Zur globalen Ebene">🌍 <span data-i18n="bc_global">Global (IKRK)</span></button></div>
    <span class="bc-sep">›</span>
    <div class="bc-item" id="bc-national"><button onclick="setLevel('national')" aria-label="Zur nationalen Ebene">🇩🇪 <span data-i18n="bc_national">National (DRK)</span></button></div>
    <span class="bc-sep">›</span>
    <div class="bc-item" id="bc-local"><button onclick="setLevel('local')" aria-label="Zur lokalen Ebene">📍 <span data-i18n="bc_local">Lokal (Hamburg)</span></button></div>
  </nav>

  <div class="header-controls">
    <button class="lang-toggle" id="lang-btn" onclick="toggleLang()" title="Switch language / Sprache wechseln">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
      <span id="lang-label">EN</span>
    </button>
    <button class="btn-icon" data-theme-toggle aria-label="Farbschema wechseln">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </div>
</header>
